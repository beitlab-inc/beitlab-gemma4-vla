# ================================================================
# Multi-camera — Stage 1: Action Expert warm-up (backbone frozen)
# ================================================================
# First half of the two-stage recipe (docs/06_training.md §8).
# Backbone is frozen → run cache_features.py once, then
# train_cached.py for ~100x speedup.
#
# Camera order MUST match the HDF5 `camera_names` attr in
# data/push_demos_multicam (topview, corner, gripperPOV).
#
# Run:
#   # 1) Cache backbone features (one-time)
#   uv run python -m robots.metaworld.scripts.cache_features \
#       --config robots/metaworld/configs/metaworld_push_multicam_stage1.yaml \
#       --data-dir data/push_demos_multicam \
#       --output-dir data/push_demos_multicam_features
#
#   # 2) Train action expert on cached features
#   uv run python -m robots.metaworld.scripts.train_cached \
#       --config robots/metaworld/configs/metaworld_push_multicam_stage1.yaml \
#       --cache-dir data/push_demos_multicam_features

vision:
  num_cameras: 3
  camera_names: ["topview", "corner", "gripperPOV"]
  image_size: 224
  freeze_vision: true

backbone:
  model_name: "google/gemma-4-E2B-it"
  freeze_backbone: true         # Stage 1 = backbone as frozen feature extractor
  use_lora: false               # no LoRA in Stage 1
  max_sequence_length: 1024     # ~256 image tokens x 3 cams + text headroom

action_expert:
  hidden_size: 1024
  num_layers: 8
  num_heads: 16

flow_matching:
  action_horizon: 50
  num_inference_steps: 10

robot:
  name: "metaworld-push"
  state_dim: 39
  action_dim: 4
  max_state_dim: 39

training:
  learning_rate: 0.0005         # higher LR is safe while backbone is frozen
  batch_size: 8
  grad_accum_steps: 2           # effective batch = 16
  max_steps: 3000               # 2k-5k per the two-stage recipe
  warmup_steps: 200
  grad_clip_norm: 1.0
  mixed_precision: "bf16"
  gradient_checkpointing: false # backbone frozen — checkpointing buys nothing
  eval_every_n_steps: 100
  early_stopping_patience: 5
  early_stopping_min_delta: 0.001
  output_dir: "./checkpoints/metaworld_push_multicam_stage1"
  dataset_root: "./data/push_demos_multicam"
