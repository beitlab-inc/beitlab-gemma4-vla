# ================================================================
# Strategy 1: Action Expert Only (recommended start)
# ================================================================
# Backbone frozen as a feature extractor. Only the action expert
# trains.  Fast convergence, low VRAM, works with small datasets.
#
# VRAM:  ~12 GB (GPU) / ~11 GB (M3 unified)
# Data:  100-1K demos sufficient
# GPU:   Any 16GB+ GPU, Apple M-series, or RTX 3060+
#
# Run:
#   uv run python -m robots.metaworld.scripts.train \
#       --config robots/metaworld/configs/metaworld_push_expert_only.yaml \
#       --data-dir data/metaworld_demos

vision:
  num_cameras: 1
  image_size: 224
  freeze_vision: true

backbone:
  model_name: "google/gemma-4-E2B-it"
  freeze_backbone: true       # backbone = frozen feature extractor
  use_lora: false              # no LoRA needed when frozen

action_expert:
  hidden_size: 1024
  num_layers: 8
  num_heads: 16

flow_matching:
  action_horizon: 50
  num_inference_steps: 10

robot:
  name: "metaworld-push"
  state_dim: 39
  action_dim: 4
  max_state_dim: 39

training:
  learning_rate: 0.0005        # higher LR since only expert trains
  batch_size: 16
  max_steps: 20000
  warmup_steps: 500
  mixed_precision: "bf16"
  output_dir: "./checkpoints/metaworld_push_expert"
  dataset_root: "./data/metaworld_demos"
