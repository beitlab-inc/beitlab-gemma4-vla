# ================================================================
# Strategy 1: Action Expert Only (recommended start)
# ================================================================
# Backbone frozen as a feature extractor. Only the action expert
# trains.  Fast convergence, low VRAM, works with small datasets.
#
# VRAM:  ~12 GB (GPU) / ~11 GB (M3 unified)
# Data:  100-1K demos sufficient
# GPU:   Any 16GB+ GPU, Apple M-series, or RTX 3060+
#
# Run:
#   uv run python -m robots.metaworld.scripts.train \
#       --config robots/metaworld/configs/metaworld_push_expert_only.yaml \
#       --data-dir data/metaworld_demos

vision:
  num_cameras: 1
  camera_names: ["topview"]
  image_size: 224
  freeze_vision: true

backbone:
  model_name: "google/gemma-4-E2B-it"
  freeze_backbone: true       # backbone = frozen feature extractor
  use_lora: false              # no LoRA needed when frozen
  max_sequence_length: 384    # was 1024; ~7x lower attention cost

action_expert:
  hidden_size: 1024
  num_layers: 8
  num_heads: 16

flow_matching:
  action_horizon: 50
  num_inference_steps: 10

robot:
  name: "metaworld-push"
  state_dim: 39
  action_dim: 4
  max_state_dim: 39

training:
  learning_rate: 0.0002        # was 5e-4; lowered to fix cached-training divergence
  batch_size: 2                # Thor-safe; raise to 16 on 16GB+ discrete GPUs
  grad_accum_steps: 4          # effective batch = 8
  max_steps: 20000
  warmup_steps: 1000           # longer warmup damps the early-step instability
  grad_clip_norm: 0.5          # tighter clipping to catch gradient spikes
  mixed_precision: "bf16"
  gradient_checkpointing: false  # backbone is frozen — checkpointing buys nothing
  num_workers: 3                 # Thor unified memory: each worker forks ~3GB
  prefetch_factor: 2             # tighter prefetch to bound queue memory
  early_stopping_patience: 3     # stop after 3 evals with no val_loss improvement
  early_stopping_min_delta: 0.001  # require >=0.001 absolute drop to count
  eval_every_n_steps: 50        # eval more often so early stop reacts in time
  output_dir: "./checkpoints/metaworld_push_expert"
  dataset_root: "./data/metaworld_demos"
