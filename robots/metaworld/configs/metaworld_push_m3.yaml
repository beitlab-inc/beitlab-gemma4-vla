# MetaWorld push-v3 config — optimised for Apple M3 (18 GB unified memory)
#
# Key differences from metaworld_push.yaml:
#   - Backbone frozen (no LoRA) — saves ~7 GB optimizer/gradient memory
#   - Batch size 1 — fits in MPS memory budget
#   - Gradient accumulation 8 — effective batch = 8
#   - Higher learning rate for action expert (only trainable part)

vision:
  num_cameras: 1
  image_size: 224
  freeze_vision: true

backbone:
  model_name: "google/gemma-4-E2B-it"
  freeze_backbone: true       # frozen — used as feature extractor only
  use_lora: false              # no LoRA → saves ~7 GB

action_expert:
  hidden_size: 1024
  num_layers: 8
  num_heads: 16

flow_matching:
  action_horizon: 50
  num_inference_steps: 10

robot:
  name: "metaworld-push"
  state_dim: 39
  action_dim: 4
  max_state_dim: 39

training:
  learning_rate: 0.0005        # higher LR since only expert trains
  batch_size: 1                # fits in 18 GB MPS
  grad_accum_steps: 8          # effective batch = 8
  gradient_checkpointing: false  # not needed with frozen backbone
  max_steps: 15000
  warmup_steps: 300
  mixed_precision: "bf16"
  output_dir: "./checkpoints/metaworld_push_m3"
  dataset_root: "./data/metaworld_demos"
