# ================================================================
# Strategy 2: LoRA + Action Expert (balanced)
# ================================================================
# LoRA adapters on the backbone language model let it adapt to the
# robot domain while keeping most weights frozen. Vision tower is
# frozen separately.  Good balance of adaptation and efficiency.
#
# VRAM:  ~24 GB
# Data:  1K-10K demos recommended
# GPU:   RTX 4090 (24GB), A10 (24GB), or A100
#
# Run:
#   uv run python -m robots.metaworld.scripts.train \
#       --config robots/metaworld/configs/metaworld_push.yaml \
#       --data-dir data/metaworld_demos

vision:
  num_cameras: 1
  camera_names: ["topview"]
  image_size: 224
  freeze_vision: true          # vision tower always frozen with LoRA

backbone:
  model_name: "google/gemma-4-E2B-it"
  freeze_backbone: false       # backbone unfrozen (LoRA handles freezing)
  use_lora: true
  lora_rank: 16
  lora_alpha: 32.0
  lora_target_modules:
    - "q_proj"
    - "k_proj"
    - "v_proj"
    - "o_proj"

action_expert:
  hidden_size: 1024
  num_layers: 8
  num_heads: 16

flow_matching:
  action_horizon: 50
  num_inference_steps: 10

robot:
  name: "metaworld-push"
  state_dim: 39
  action_dim: 4
  max_state_dim: 39

training:
  learning_rate: 0.0002
  backbone_lr_multiplier: 0.1  # backbone LoRA trains 10x slower
  batch_size: 16
  max_steps: 50000
  warmup_steps: 1000
  mixed_precision: "bf16"
  output_dir: "./checkpoints/metaworld_push_lora"
  dataset_root: "./data/metaworld_demos"
